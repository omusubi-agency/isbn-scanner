<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <!-- 外部リクエストに戻り先URL(GASアプリのURL)を漏らさない -->
  <meta name="referrer" content="no-referrer">
  <title>ISBN ライブスキャン</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      margin: 0; padding: 16px; background: #0f1115; color: #f0f2f5; text-align: center;
    }
    h1 { font-size: 24px; margin: 0 0 10px; }
    #video { width: 100%; max-width: 480px; border-radius: 10px; background: #000; }
    button {
      padding: 12px 20px; border: none; border-radius: 8px; font-size: 20px;
      background: #2563eb; color: #fff; cursor: pointer; margin: 8px 4px;
    }
    button.sub { background: #374151; }
    button:disabled { opacity: .5; }
    .actions { display: flex; justify-content: center; gap: 8px; max-width: 480px; margin: 0 auto; }
    .actions button { flex: 1 1 0; min-width: 0; max-width: 150px; margin: 8px 0; padding: 12px 8px; font-size: 18px; }
    #backBtn { font-size: 18px; }
    .status { font-size: 18px; color: #cbd5e1; margin: 12px 0; min-height: 1.4em; overflow-wrap: anywhere; }
    .hint { font-size: 15px; color: #8b949e; margin-top: 8px; }
    @media (max-width: 600px) {
      .actions { flex-direction: column; max-width: 320px; }
      .actions button { max-width: none; width: 100%; margin: 6px 0; }
      #backBtn { display: block; width: 100%; max-width: 320px; margin: 6px auto; }
    }
  </style>
</head>
<body>
  <h1>📷 ISBN ライブスキャン</h1>
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas" style="display:none"></canvas>
  <div class="status" id="status">「スキャン開始」を押してカメラを起動してください。</div>
  <input id="fileInput" type="file" accept="image/*" hidden>
  <div class="actions">
    <button id="fileBtn" class="sub">ファイルを選択</button>
    <button id="startBtn">スキャン開始</button>
    <button id="photoBtn" class="sub">写真を撮る</button>
  </div>
  <button id="backBtn" class="sub">戻る</button>
  <div class="hint">ISBNバーコード（978/979で始まる方）をカメラに大きく写してください。<br>下の価格コード(192)は自動で無視します。</div>

  <script type="module">
    import { readBarcodes, prepareZXingModule }
      from 'https://cdn.jsdelivr.net/npm/zxing-wasm@3.1.0/dist/es/reader/index.js';
    prepareZXingModule({
      overrides: {
        locateFile: function (path, prefix) {
          return path.endsWith('.wasm')
            ? 'https://cdn.jsdelivr.net/npm/zxing-wasm@3.1.0/dist/reader/' + path
            : prefix + path;
        }
      }
    });

    var RETURN_URL = new URLSearchParams(location.search).get('return') || '';
    var statusEl = document.getElementById('status');
    var startBtn = document.getElementById('startBtn');
    var fileBtn = document.getElementById('fileBtn');
    var photoBtn = document.getElementById('photoBtn');
    var fileInput = document.getElementById('fileInput');
    var video = document.getElementById('video');
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d', { willReadFrequently: true });
    var stream = null, scanning = false, lastDecode = 0;

    function setStatus(t) { statusEl.textContent = t; }
    function isIsbn(c) { return /^97[89]\d{10}$/.test(c); }

    startBtn.addEventListener('click', start);
    fileBtn.addEventListener('click', function () { fileInput.click(); });
    photoBtn.addEventListener('click', onPhoto);
    fileInput.addEventListener('change', function () { decodeFile(fileInput.files[0]); fileInput.value = ''; });
    document.getElementById('backBtn').addEventListener('click', function () {
      if (RETURN_URL) { location.href = RETURN_URL; }
    });

    async function decodeFile(file) {
      if (!file) { return; }
      setStatus('画像からISBNバーコードを読み取っています…');
      try {
        var results = await readBarcodes(file, { tryHarder: true, maxNumberOfSymbols: 20 });
        var codes = (results || []).map(function (r) { return r.text; });
        var isbn = codes.filter(isIsbn)[0];
        if (isbn) { finish(isbn); return; }
        setStatus('ISBNバーコードを読み取れませんでした。もう一度お試しください。');
      } catch (e) {
        setStatus('ISBNバーコードを読み取れませんでした。もう一度お試しください。');
      }
    }

    async function start() {
      startBtn.disabled = true;
      setStatus('カメラを起動しています…');
      if (!(await ensureCamera())) { startBtn.disabled = false; return; }
      scanning = true;
      setStatus('ISBNバーコードをカメラに合わせてください…');
      requestAnimationFrame(tick);
    }

    async function ensureCamera() {
      if (stream) { return true; }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = stream;
        await video.play();
        try {
          var vtrack = stream.getVideoTracks()[0];
          if (vtrack && vtrack.getCapabilities) {
            var caps = vtrack.getCapabilities();
            if (caps && 'backgroundBlur' in caps) {
              await vtrack.applyConstraints({ advanced: [{ backgroundBlur: false }] });
            }
          }
        } catch (e) { /* 背景ぼかし制御は未対応。無視 */ }
        return true;
      } catch (e) {
        setStatus('カメラを利用できませんでした: ' + e + '（iOSではSafariもお試しください）');
        return false;
      }
    }

    async function onPhoto() {
      if (!stream) {
        setStatus('カメラを起動しています…');
        if (!(await ensureCamera())) { return; }
        scanning = false;
        photoBtn.textContent = '📸 撮影';
        setStatus('バーコードを画面に合わせて「📸 撮影」を押してください。');
        return;
      }
      if (!video.videoWidth) { setStatus('カメラ準備中です。少し待って再度お試しください。'); return; }
      setStatus('解析中…');
      var c = document.createElement('canvas');
      c.width = video.videoWidth; c.height = video.videoHeight;
      var cx = c.getContext('2d');
      cx.drawImage(video, 0, 0, c.width, c.height);
      try {
        var results = await readBarcodes(cx.getImageData(0, 0, c.width, c.height), { tryHarder: true, maxNumberOfSymbols: 20 });
        var codes = (results || []).map(function (r) { return r.text; });
        var isbn = codes.filter(isIsbn)[0];
        if (isbn) { finish(isbn); return; }
        setStatus('ISBNを読み取れませんでした。位置を調整して「📸 撮影」をもう一度押してください。');
      } catch (e) {
        setStatus('読み取りに失敗しました。もう一度お試しください。');
      }
    }

    async function tick(ts) {
      if (!scanning) { return; }
      // 動画は滑らかに保ち、解析は約200ms間隔に間引く
      if (ts - lastDecode > 200 && video.videoWidth) {
        lastDecode = ts;
        var vw = video.videoWidth, vh = video.videoHeight;
        var scale = Math.min(1, 960 / Math.max(vw, vh));
        canvas.width = Math.round(vw * scale);
        canvas.height = Math.round(vh * scale);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
          var img = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var results = await readBarcodes(img, { tryHarder: true, maxNumberOfSymbols: 5 });
          var codes = (results || []).map(function (r) { return r.text; });
          var isbn = codes.filter(isIsbn)[0];
          if (isbn) { finish(isbn); return; }
        } catch (e) { /* このフレームは読めず。次へ */ }
      }
      requestAnimationFrame(tick);
    }

    function finish(isbn) {
      scanning = false;
      setStatus('ISBN 読み取り: ' + isbn + ' — 戻ります…');
      if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); }
      if (RETURN_URL) {
        location.href = RETURN_URL + (RETURN_URL.indexOf('?') >= 0 ? '&' : '?') +
          'isbn=' + encodeURIComponent(isbn);
      }
    }
  </script>
</body>
</html>
