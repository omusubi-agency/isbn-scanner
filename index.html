<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <!-- 外部リクエストに戻り先URL(GASアプリのURL)を漏らさない -->
  <meta name="referrer" content="no-referrer">
  <title>ISBN ライブスキャン</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      margin: 0; padding: 20px; background: #0f1115; color: #f0f2f5; text-align: center;
    }
    h1 { font-size: 18px; margin: 0 0 12px; }
    #reader { width: 100%; max-width: 480px; margin: 0 auto; }
    button {
      padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px;
      background: #2563eb; color: #fff; cursor: pointer; margin: 8px 4px;
    }
    button.sub { background: #374151; }
    .status { font-size: 14px; color: #cbd5e1; margin: 14px 0; min-height: 1.4em; overflow-wrap: anywhere; }
    .hint { font-size: 12px; color: #8b949e; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>📷 ISBN ライブスキャン</h1>
  <div id="reader"></div>
  <div class="status" id="status">「スキャン開始」を押してカメラを起動してください。</div>
  <button id="startBtn" onclick="startScan()">スキャン開始</button>
  <button class="sub" onclick="goBack()">戻る</button>
  <div class="hint">本のISBNバーコード（978/979で始まる方）を枠に合わせてください。<br>下の価格コード(192)は自動で無視します。</div>

  <!-- ライブラリは同梱（外部CDNに接続しない） -->
  <script src="html5-qrcode.min.js"></script>
  <script>
    // 戻り先（GASアプリのURL）。呼び出し元から ?return=... で渡される。
    var params = new URLSearchParams(location.search);
    var RETURN_URL = params.get('return') || '';
    var html5QrCode = null;
    var done = false;

    function setStatus(t) { document.getElementById('status').textContent = t; }
    function isIsbn(code) { return /^97[89]\d{10}$/.test(code); }

    function goBack() {
      if (RETURN_URL) { location.href = RETURN_URL; }
      else { setStatus('戻り先が指定されていません。'); }
    }

    function startScan() {
      if (typeof Html5Qrcode === 'undefined') {
        setStatus('スキャン用ライブラリを読み込めませんでした。通信環境をご確認ください。');
        return;
      }
      document.getElementById('startBtn').disabled = true;
      setStatus('カメラを起動しています…');
      html5QrCode = new Html5Qrcode('reader', {
        formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13],
        verbose: false
      });
      html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 280, height: 160 } },
        onSuccess,
        function () { /* フレーム毎の失敗は無視 */ }
      ).then(function () {
        setStatus('バーコードを枠に合わせてください…');
      }).catch(function (err) {
        document.getElementById('startBtn').disabled = false;
        setStatus('カメラを利用できませんでした（' + err + '）。カメラ権限を許可してください。');
      });
    }

    function onSuccess(text) {
      if (done) { return; }
      if (isIsbn(text)) {
        done = true;
        setStatus('ISBN を読み取りました: ' + text + ' — 戻ります…');
        stopAndReturn(text);
      } else {
        setStatus('商品コード(' + text + ')を検出。ISBN(978/979)を探しています…');
      }
    }

    function stopAndReturn(isbn) {
      var go = function () {
        if (RETURN_URL) {
          location.href = RETURN_URL + (RETURN_URL.indexOf('?') >= 0 ? '&' : '?') + 'isbn=' + encodeURIComponent(isbn);
        } else {
          setStatus('読み取り値: ' + isbn + '（戻り先未指定）');
        }
      };
      if (html5QrCode) {
        html5QrCode.stop().then(go).catch(go);
      } else { go(); }
    }
  </script>
</body>
</html>
